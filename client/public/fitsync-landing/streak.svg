<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFEDE6"/>
      <stop offset="100%" stop-color="#D9D6CB"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3A83B"/>
      <stop offset="100%" stop-color="#d97726"/>
    </linearGradient>
  </defs>
  
  <rect width="500" height="400" fill="url(#sbg)"/>

  <!-- Background grid & sparkles -->
  <g opacity="0.2" stroke="#16231F" stroke-width="2">
    <line x1="50" y1="0" x2="50" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="0" y1="350" x2="500" y2="350"/>
  </g>
  <circle cx="100" cy="100" r="60" fill="#1E8E5A" opacity="0.08"/>
  <circle cx="400" cy="300" r="80" fill="#E3A83B" opacity="0.08"/>

  <!-- Main Streak Card -->
  <g transform="translate(60, 60)">
    <!-- Shadow -->
    <rect x="10" y="15" width="400" height="250" rx="20" fill="#16231F" opacity="0.12"/>
    <!-- Card Body -->
    <rect width="400" height="250" rx="20" fill="#ffffff" stroke="#B9B6AC" stroke-width="2"/>
    
    <!-- Title -->
    <rect x="30" y="30" width="80" height="15" rx="5" fill="#1E8E5A" opacity="0.2"/>
    <text x="30" y="70" font-family="Arial" font-size="24" font-weight="bold" fill="#16231F">CURRENT STREAK</text>
    
    <!-- Big Flame & Number -->
    <g transform="translate(250, 25)">
      <path d="M40 0 C60 30 70 60 50 80 C30 100 0 90 0 60 C0 30 20 20 40 0 Z" fill="url(#flame)"/>
      <path d="M40 30 C50 50 50 65 40 75 C30 85 15 75 20 55 C25 35 35 35 40 30 Z" fill="#ffffff" opacity="0.8"/>
      <text x="70" y="65" font-family="Arial" font-size="64" font-weight="bold" fill="#E3A83B">12</text>
      <text x="75" y="85" font-family="Arial" font-size="16" font-weight="bold" fill="#B9B6AC">DAYS</text>
    </g>

    <!-- Days of the week tracker -->
    <g transform="translate(40, 150)">
      <!-- Day 1 (Checked) -->
      <circle cx="20" cy="20" r="18" fill="#1E8E5A"/>
      <path d="M12 20 L18 26 L28 14" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <text x="20" y="55" font-family="Arial" font-size="12" font-weight="bold" fill="#16231F" text-anchor="middle">M</text>

      <!-- Day 2 (Checked) -->
      <circle cx="75" cy="20" r="18" fill="#1E8E5A"/>
      <path d="M67 20 L73 26 L83 14" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <text x="75" y="55" font-family="Arial" font-size="12" font-weight="bold" fill="#16231F" text-anchor="middle">T</text>

      <!-- Day 3 (Checked) -->
      <circle cx="130" cy="20" r="18" fill="#1E8E5A"/>
      <path d="M122 20 L128 26 L138 14" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <text x="130" y="55" font-family="Arial" font-size="12" font-weight="bold" fill="#16231F" text-anchor="middle">W</text>

      <!-- Day 4 (Checked) -->
      <circle cx="185" cy="20" r="18" fill="#1E8E5A"/>
      <path d="M177 20 L183 26 L193 14" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <text x="185" y="55" font-family="Arial" font-size="12" font-weight="bold" fill="#16231F" text-anchor="middle">T</text>

      <!-- Day 5 (Today - highlighted) -->
      <circle cx="240" cy="20" r="22" fill="#E3A83B" opacity="0.2"/>
      <circle cx="240" cy="20" r="18" fill="#E3A83B"/>
      <path d="M232 20 L238 26 L248 14" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
      <text x="240" y="55" font-family="Arial" font-size="12" font-weight="bold" fill="#E3A83B" text-anchor="middle">F</text>

      <!-- Day 6 (Empty) -->
      <circle cx="295" cy="20" r="16" fill="none" stroke="#B9B6AC" stroke-width="3"/>
      <text x="295" y="55" font-family="Arial" font-size="12" font-weight="bold" fill="#B9B6AC" text-anchor="middle">S</text>
    </g>
  </g>

</svg>
