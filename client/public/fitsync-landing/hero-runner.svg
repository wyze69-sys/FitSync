<svg viewBox="0 0 1200 800" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16231F"/>
      <stop offset="100%" stop-color="#0B1310"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E8E5A"/>
      <stop offset="100%" stop-color="#16231F" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="800" fill="url(#hbg)"/>

  <!-- AI Grid Background -->
  <g opacity="0.15" stroke="#1E8E5A" stroke-width="1.5">
    <path d="M0 100 L1200 100 M0 200 L1200 200 M0 300 L1200 300 M0 400 L1200 400 M0 500 L1200 500 M0 600 L1200 600 M0 700 L1200 700"/>
    <path d="M100 0 L100 800 M200 0 L200 800 M300 0 L300 800 M400 0 L400 800 M500 0 L500 800 M600 0 L600 800 M700 0 L700 800 M800 0 L800 800 M900 0 L900 800 M1000 0 L1000 800 M1100 0 L1100 800"/>
  </g>

  <!-- Glowing AI nodes and paths -->
  <g fill="none" stroke="#E3A83B" stroke-width="2" opacity="0.6">
    <path d="M200 600 L400 400 L700 400 L900 200"/>
    <path d="M100 200 L300 400 L500 600 L800 600"/>
  </g>
  <g fill="#E3A83B" opacity="0.8">
    <circle cx="200" cy="600" r="6"/>
    <circle cx="400" cy="400" r="8"/>
    <circle cx="700" cy="400" r="6"/>
    <circle cx="900" cy="200" r="10"/>
    <circle cx="100" cy="200" r="6"/>
    <circle cx="300" cy="400" r="5"/>
    <circle cx="500" cy="600" r="8"/>
    <circle cx="800" cy="600" r="6"/>
  </g>

  <!-- Large Data Orbs -->
  <circle cx="900" cy="400" r="250" fill="url(#glow)" opacity="0.4"/>
  <circle cx="500" cy="600" r="300" fill="url(#glow)" opacity="0.2"/>
  <circle cx="1050" cy="150" r="150" fill="#E3A83B" opacity="0.1"/>

  <!-- Dashboard Floating UI on the Right Side (To be visible under the overlay) -->
  <g transform="translate(650, 180)">
    
    <!-- UI Card 1 (Analytics) -->
    <g transform="translate(50, 0)">
      <rect x="0" y="0" width="340" height="220" rx="15" fill="#2B3F38" opacity="0.9" stroke="#1E8E5A" stroke-width="2"/>
      <rect x="20" y="20" width="80" height="15" rx="5" fill="#1E8E5A"/>
      <rect x="20" y="45" width="120" height="8" rx="4" fill="#B9B6AC" opacity="0.5"/>
      
      <!-- Graph Line -->
      <path d="M 20 180 L 80 140 L 140 160 L 200 80 L 260 100 L 310 40" fill="none" stroke="#E3A83B" stroke-width="6" stroke-linecap="round"/>
      <circle cx="80" cy="140" r="6" fill="#ffffff"/>
      <circle cx="200" cy="80" r="6" fill="#ffffff"/>
      <circle cx="310" cy="40" r="8" fill="#ffffff"/>
      
      <!-- Graph Fill -->
      <path d="M 20 180 L 80 140 L 140 160 L 200 80 L 260 100 L 310 40 L 310 220 L 20 220 Z" fill="url(#glow)" opacity="0.3"/>
    </g>

    <!-- UI Card 2 (User Progress) -->
    <g transform="translate(180, 260)">
      <rect x="0" y="0" width="280" height="150" rx="15" fill="#16231F" opacity="0.95" stroke="#E3A83B" stroke-width="2"/>
      <!-- Circular Progress -->
      <circle cx="70" cy="75" r="40" fill="none" stroke="#2B3F38" stroke-width="10"/>
      <circle cx="70" cy="75" r="40" fill="none" stroke="#E3A83B" stroke-width="10" stroke-dasharray="180 250" stroke-linecap="round" transform="rotate(-90 70 75)"/>
      <text x="70" y="82" font-family="Arial" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">85%</text>
      
      <!-- Text details -->
      <rect x="130" y="50" width="100" height="12" rx="6" fill="#1E8E5A"/>
      <rect x="130" y="75" width="120" height="8" rx="4" fill="#B9B6AC" opacity="0.6"/>
      <rect x="130" y="95" width="80" height="8" rx="4" fill="#B9B6AC" opacity="0.6"/>
    </g>
    
    <!-- UI Card 3 (AI Tips) -->
    <g transform="translate(-20, 240)">
      <rect x="0" y="0" width="170" height="180" rx="15" fill="#DEF2E4" opacity="0.9"/>
      <circle cx="85" cy="50" r="25" fill="#1E8E5A"/>
      <path d="M75 50 L82 58 L95 42" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
      <rect x="25" y="100" width="120" height="8" rx="4" fill="#16231F" opacity="0.8"/>
      <rect x="25" y="120" width="100" height="8" rx="4" fill="#16231F" opacity="0.5"/>
      <rect x="25" y="140" width="80" height="8" rx="4" fill="#16231F" opacity="0.5"/>
    </g>

  </g>

</svg>
