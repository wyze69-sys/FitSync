<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-labelledby="streak3Title">
  <title id="streak3Title">Three Day Streak Spark</title>
  <desc>A small amber spark with three embers for an early three-day streak.</desc>
  <defs>
    <radialGradient id="s3Body" cx="42%" cy="34%" r="80%">
      <stop offset="0%" stop-color="#3E3119"/>
      <stop offset="100%" stop-color="#1A1407"/>
    </radialGradient>
    <linearGradient id="s3Ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE3A0"/>
      <stop offset="100%" stop-color="#C98A22"/>
    </linearGradient>
    <linearGradient id="s3Spark" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FFB23E"/>
      <stop offset="100%" stop-color="#FFF3C4"/>
    </linearGradient>
  </defs>
  <circle cx="48" cy="48" r="42" fill="url(#s3Ring)"/>
  <circle cx="48" cy="48" r="35" fill="url(#s3Body)"/>
  <circle cx="48" cy="48" r="35" fill="none" stroke="#FFE3A0" stroke-opacity="0.4" stroke-width="1.3"/>
  <path fill="url(#s3Spark)" d="M48 33 c3 7 6 10 6 15 a6.5 6.5 0 1 1 -13 0 c0 -4 2 -7 4 -9 c1 2 2 3 3 3 c0 -3 -1 -6 0 -9 Z"/>
  <circle cx="48" cy="49" r="2.4" fill="#FFF7DD"/>
  <g fill="#FFCF6A">
    <circle cx="30" cy="60" r="2.4"/>
    <circle cx="48" cy="68" r="2.4"/>
    <circle cx="66" cy="60" r="2.4"/>
  </g>
  <ellipse cx="40" cy="34" rx="12" ry="6" fill="#FFFFFF" fill-opacity="0.12"/>
</svg>
